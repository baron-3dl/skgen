name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skills from source
        run: bash scripts/package-skills.sh

      - name: Bundle the plugin payload
        run: zip -r skillc-skills.zip skills .claude-plugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: skillc-skills.zip
