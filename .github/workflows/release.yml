name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skills from source
        run: bash scripts/package-skills.sh

      - name: Bundle the plugin payload and a per-skill zip for claude.ai upload
        run: |
          zip -r skillc-skills.zip plugins .claude-plugin
          for d in plugins/*/skills/*/; do
            name=$(basename "$d")
            parent=$(dirname "$d")
            (cd "$parent" && zip -r "$GITHUB_WORKSPACE/$name.zip" "$name")
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
